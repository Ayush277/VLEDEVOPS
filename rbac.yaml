apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: limited-access
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: limited-access-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: default
  namespace: default
roleRef:
  kind: Role
  name: limited-access
  apiGroup: rbac.authorization.k8s.io
